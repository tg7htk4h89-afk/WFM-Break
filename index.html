<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KIB · Pro Break System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── PREMIUM CSS DESIGN SYSTEM ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#0D5CA6; --navy-dark:#0A4A8A; --navy-light:#1A75D1;
  --gold:#00A89A; --gold-light:#00BEAE; --gold-bg:#E6F7F6;
  --bg:#F4F7FA; --surface:#FFFFFF; --border:#E2E8F0;
  --text-main:#0F172A; --text-muted:#64748B; --text-light:#94A3B8;
  --green:#10B981; --green-bg:#D1FAE5;
  --amber:#F59E0B; --amber-bg:#FEF3C7;
  --red:#EF4444; --red-bg:#FEE2E2;
  --radius: 16px; --radius-sm: 10px;
  --shadow: 0 4px 20px rgba(0,0,0,0.03);
  --shadow-hover: 0 10px 30px rgba(13,92,166,0.08);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text-main);min-height:100vh;font-size:14px;}
button,input,select{font-family:inherit;outline:none;}

/* ── ANIMATIONS ── */
@keyframes slideUp { from{opacity:0;transform:translateY(15px);} to{opacity:1;transform:translateY(0);} }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(16,185,129,0.4);} 70%{box-shadow:0 0 0 6px rgba(16,185,129,0);} 100%{box-shadow:0 0 0 0 rgba(16,185,129,0);} }
@keyframes pulseAmber { 0%{box-shadow:0 0 0 0 rgba(245,158,11,0.4);} 70%{box-shadow:0 0 0 6px rgba(245,158,11,0);} 100%{box-shadow:0 0 0 0 rgba(245,158,11,0);} }

/* ── LOGIN ── */
#sLogin{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at top left, #1A75D1 0%, var(--navy) 100%);}
.login-card{background:var(--surface);width:100%;max-width:400px;border-radius:24px;box-shadow:0 24px 48px rgba(0,0,0,0.2);overflow:hidden;animation:slideUp 0.6s cubic-bezier(0.16,1,0.3,1);}
.login-hdr{padding:30px 20px 20px;text-align:center;}
.kib-logo{width:64px;height:64px;background:var(--gold-bg);color:var(--gold);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;font-weight:800;}
.login-title{font-size:20px;font-weight:800;color:var(--text-main);}
.login-sub{font-size:13px;color:var(--text-muted);margin-top:4px;}
.lstep{display:none;padding:0 24px 30px;}
.lstep.on{display:block;animation:slideUp 0.4s ease;}
.fld{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:15px;transition:0.2s;background:#F8FAFC;}
.fld:focus{border-color:var(--navy);background:var(--surface);box-shadow:0 0 0 4px rgba(13,92,166,0.1);}
.btn-main{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:0.2s;margin-top:10px;}
.btn-main:active{transform:scale(0.98);}

/* ── TOP NAV (GLASSMORPHISM) ── */
.topbar{background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);height:60px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);}
.tlogo{font-size:18px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px;}
.sync-badge{font-size:10px;padding:4px 8px;border-radius:20px;background:var(--green-bg);color:var(--green);font-weight:700;}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin:16px;box-shadow:var(--shadow);transition:0.2s;overflow:hidden;}
.card:hover{box-shadow:var(--shadow-hover);}
.c-hdr{padding:16px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;display:flex;justify-content:space-between;align-items:center;background:#FACBD;}
.c-body{padding:20px;}

/* ── LIVE TEAM MONITOR ── */
.dept-title{font-size:11px;font-weight:800;text-transform:uppercase;color:var(--text-light);letter-spacing:1px;margin:20px 16px 8px;display:flex;align-items:center;gap:8px;}
.dept-title::after{content:'';flex:1;height:1px;background:var(--border);}
.agent-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.agent-row:last-child{border-bottom:none;}
.av{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;position:relative;}
.status-dot{position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-radius:50%;border:2px solid var(--surface);}
.status-dot.free{background:var(--green);animation:pulse 2s infinite;}
.status-dot.on{background:var(--amber);animation:pulseAmber 1.5s infinite;}
.a-name{font-weight:600;font-size:14px;}
.a-role{font-size:11px;color:var(--text-muted);margin-top:2px;}
.a-right{margin-left:auto;text-align:right;}
.a-time{font-size:12px;font-weight:700;}
.a-prog{width:60px;height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.a-fill{height:100%;background:var(--navy);border-radius:2px;transition:width 0.3s ease;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;padding:12px 0;background:none;border:none;color:var(--text-muted);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:0.2s;}
.nb.on{color:var(--navy);font-weight:700;}
.nb i{font-size:20px;font-style:normal;}

/* ── UTILS ── */
.pg{display:none;padding-bottom:80px;animation:slideUp 0.3s ease;}
.pg.on{display:block;}
.pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.pill.green{background:var(--green-bg);color:var(--green);}
.pill.amber{background:var(--amber-bg);color:var(--amber);}
</style>
</head>
<body>

<div id="sLogin">
  <div class="login-card">
    <div class="login-hdr">
      <div class="kib-logo">KIB</div>
      <div class="login-title">Break System</div>
      <div class="login-sub">Sign in to manage your schedule</div>
    </div>
    <div class="lstep on" id="step1">
      <input type="password" id="pwInput" class="fld" placeholder="Enter Employee PIN" style="text-align:center;letter-spacing:2px;font-size:18px;">
      <div id="pwerr" style="color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none;">Invalid PIN. Try again.</div>
      <button class="btn-main" onclick="checkPw()">Secure Login</button>
    </div>
  </div>
</div>

<div id="sApp" style="display:none;">
  <div class="topbar">
    <div class="tlogo">KIB <span style="color:var(--text-muted);font-weight:500;font-size:14px;">| Operations</span></div>
    <div class="sync-badge" id="syncStatus">● Live Sync</div>
  </div>

  <div class="pg on" id="pg-home">
    <div class="card" style="background:linear-gradient(135deg, var(--navy-dark), var(--navy));color:#fff;border:none;">
      <div class="c-body" style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:12px;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:1px;">My Balance</div>
          <div style="font-size:36px;font-weight:800;margin:4px 0;"><span id="balMin">60</span><span style="font-size:16px;font-weight:500;"> min left</span></div>
        </div>
        <div style="text-align:right;">
          <div id="clockTime" style="font-size:18px;font-weight:700;color:var(--gold-light);">00:00</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="c-hdr">My Schedule Today</div>
      <div class="c-body" id="mySchedList">
        <div style="text-align:center;color:var(--text-muted);font-size:13px;">No breaks booked yet.</div>
      </div>
    </div>
  </div>

  <div class="pg" id="pg-team">
    <div style="padding:16px;">
      <h2 style="font-size:18px;font-weight:800;color:var(--navy);">Live Team Monitor</h2>
      <p style="font-size:12px;color:var(--text-muted);">Real-time status synced with Google Database</p>
    </div>
    
    <div id="teamList"></div>
  </div>

  <div class="bnav">
    <button class="nb on" onclick="nav('home')"><i>🏠</i><span style="font-size:10px;">Home</span></button>
    <button class="nb" onclick="nav('team')"><i>👥</i><span style="font-size:10px;">Team</span></button>
    <button class="nb" onclick="nav('book')"><i>📅</i><span style="font-size:10px;">Book</span></button>
    <button class="nb" onclick="doLogout()"><i>🚪</i><span style="font-size:10px;">Exit</span></button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// PROFESSIONAL CONFIG & GOOGLE DATABASE
// ════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbyh7qyNe6s1KFNtPlI_iT2MtOEgJf5IjyZ_i74OU12U0IqExZscrJER60DKgKmiMjbjKg/exec';
const EMPLOYEES = [
  {pw:'1234', name:'Saleh Aljabri', role:'Inbound Agent', dept:'Inbound'},
  {pw:'4528', name:'Asrar Alattar', role:'Outbound Agent', dept:'Outbound'},
  {pw:'3001', name:'Naser Bandar', role:'Team Leader', dept:'Management'},
  {pw:'admin', name:'System Admin', role:'Admin', dept:'Management'}
]; // Expand this list with your actual users

let me = null;
let breaksDb = [];

// App Init
function checkPw() {
  const pin = document.getElementById('pwInput').value;
  me = EMPLOYEES.find(e => e.pw === pin);
  if(me) {
    document.getElementById('sLogin').style.display = 'none';
    document.getElementById('sApp').style.display = 'block';
    startClock();
    apiPull(); // Fetch initial DB state
    setInterval(apiPull, 10000); // Live poll every 10s
    renderAll();
  } else {
    document.getElementById('pwerr').style.display = 'block';
  }
}

// ════════════════════════════════════════════
// GOOGLE SHEETS SYNC LOGIC (The "Perfect" Sync)
// ════════════════════════════════════════════
async function apiPull() {
  try {
    document.getElementById('syncStatus').textContent = "↻ Syncing...";
    document.getElementById('syncStatus').style.color = "var(--amber)";
    
    // Call Google Apps Script
    const res = await fetch(`${API_URL}?action=getBreaks&date=${new Date().toISOString().split('T')[0]}`);
    const data = await res.json();
    
    if(data && data.breaks) {
      breaksDb = data.breaks;
      renderAll();
      document.getElementById('syncStatus').textContent = "● Live Sync";
      document.getElementById('syncStatus').style.color = "var(--green)";
    }
  } catch(e) {
    console.error("DB Sync Error", e);
    document.getElementById('syncStatus').textContent = "⚠ Offline";
    document.getElementById('syncStatus').style.color = "var(--red)";
  }
}

// ════════════════════════════════════════════
// LIVE TEAM MONITOR RENDERING (WOW FEATURE)
// ════════════════════════════════════════════
function renderTeam() {
  const container = document.getElementById('teamList');
  let html = '';
  
  const depts = ['Inbound', 'Outbound', 'Management'];
  
  depts.forEach(dept => {
    const deptAgents = EMPLOYEES.filter(e => e.dept === dept);
    if(deptAgents.length === 0) return;

    html += `<div class="dept-title">${dept}</div>`;
    
    deptAgents.forEach(emp => {
      // Check if agent is currently on break in the DB
      const activeBrk = breaksDb.find(b => b.agent === emp.name && b.status === 'active');
      const isOnBreak = !!activeBrk;
      const statusCls = isOnBreak ? 'on' : 'free';
      const statusTxt = isOnBreak ? '<span style="color:var(--amber)">On Break</span>' : 'Available';
      
      // Initials for Avatar
      const inits = emp.name.split(' ').map(n=>n[0]).join('').substring(0,2);
      const color = isOnBreak ? 'var(--amber)' : 'var(--navy)';

      html += `
      <div class="agent-row">
        <div class="av" style="background:${color}">
          ${inits}
          <div class="status-dot ${statusCls}"></div>
        </div>
        <div>
          <div class="a-name">${emp.name}</div>
          <div class="a-role">${emp.role}</div>
        </div>
        <div class="a-right">
          <div class="a-time">${statusTxt}</div>
          <div class="a-prog"><div class="a-fill" style="width:${isOnBreak?'50%':'0%'}"></div></div>
        </div>
      </div>`;
    });
  });
  
  container.innerHTML = html;
}

// ════════════════════════════════════════════
// UTILS & NAVIGATION
// ════════════════════════════════════════════
function renderAll() {
  if(!me) return;
  renderTeam();
  // Add other renders (Home, Book) here based on breaksDb array
}

function nav(page) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  document.getElementById(`pg-${page}`).classList.add('on');
  event.currentTarget.classList.add('on');
  if(page === 'team') renderTeam();
}

function doLogout() {
  window.location.reload();
}

function startClock() {
  setInterval(() => {
    const d = new Date();
    document.getElementById('clockTime').textContent = 
      d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
  }, 1000);
}
</script>
</body>
</html>
