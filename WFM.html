<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIB Schedule Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a1628;--navy2:#112240;--navy3:#1a3a5c;
  --gold:#c9a84c;--gold2:#e8c96a;--gold-light:#f5e6b8;
  --white:#f8f9fa;--gray:#8899aa;--gray2:#ccd6e0;
  --red:#e74c6e;--green:#2ecc7f;--blue:#3b9eff;
  --orange:#ff8c42;--purple:#9b59b6;
  --card:rgba(17,34,64,0.97);--border:rgba(201,168,76,0.2);
  --shadow:0 20px 60px rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(201,168,76,.08) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 80%,rgba(59,158,255,.06) 0%,transparent 50%),
  linear-gradient(135deg,#0a1628 0%,#0d1f3c 50%,#0a1628 100%);z-index:-1;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--navy2);}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}
.hidden{display:none!important;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
.anim-fade{animation:fadeIn .35s ease forwards;}

/* FORM */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--gray);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.form-input,.form-select,.form-textarea{
  width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:10px 13px;color:var(--white);
  font-family:'DM Sans',sans-serif;font-size:14px;transition:all .2s;outline:none;}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--gold);background:rgba(201,168,76,.05);box-shadow:0 0 0 3px rgba(201,168,76,.1);}
.form-select option{background:var(--navy2);}
.form-textarea{resize:vertical;min-height:80px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:10px 18px;border-radius:10px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .2s;text-decoration:none;}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);font-weight:700;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.3);}
.btn-secondary{background:rgba(255,255,255,.05);color:var(--white);border:1px solid rgba(255,255,255,.1);}
.btn-secondary:hover{background:rgba(255,255,255,.09);}
.btn-danger{background:rgba(231,76,110,.15);color:var(--red);border:1px solid rgba(231,76,110,.2);}
.btn-success{background:rgba(46,204,127,.15);color:var(--green);border:1px solid rgba(46,204,127,.2);}
.btn-sm{padding:6px 13px;font-size:12px;}
.btn-full{width:100%;}

/* LOGIN */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{width:100%;max-width:460px;background:var(--card);border:1px solid var(--border);
  border-radius:24px;padding:44px 38px;box-shadow:var(--shadow);animation:fadeIn .6s ease;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .logo-icon{width:68px;height:68px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:18px;display:inline-flex;align-items:center;justify-content:center;
  font-size:30px;margin-bottom:14px;box-shadow:0 8px 28px rgba(201,168,76,.3);}
.login-logo h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;}
.login-logo p{color:var(--gray);font-size:12px;margin-top:3px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px;}
.role-card{border:2px solid var(--border);border-radius:13px;padding:14px 10px;
  cursor:pointer;text-align:center;transition:all .2s;background:rgba(255,255,255,.02);}
.role-card:hover{border-color:var(--gold);background:rgba(201,168,76,.05);}
.role-card.active{border-color:var(--gold);background:rgba(201,168,76,.1);}
.role-card .ri{font-size:22px;margin-bottom:5px;}
.role-card .rn{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--white);}

/* LAYOUT */
#appLayout{display:flex;min-height:100vh;}
.sidebar{width:256px;min-height:100vh;background:rgba(9,20,38,.99);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;}
.sidebar-logo{padding:22px 18px;border-bottom:1px solid var(--border);}
.sidebar-logo .lm{display:flex;align-items:center;gap:11px;}
.sidebar-logo .lm .ic{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.sidebar-logo h2{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;}
.sidebar-logo p{font-size:10px;color:var(--gray);}
.sidebar-user{padding:14px 18px;border-bottom:1px solid var(--border);background:rgba(201,168,76,.04);
  display:flex;align-items:center;gap:10px;}
.sidebar-user .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--navy3),var(--gold));
  display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;flex-shrink:0;}
.sidebar-user .nm{font-size:12px;font-weight:600;}
.sidebar-user .rl{font-size:10px;color:var(--gold);}
.sidebar-nav{flex:1;padding:10px 0;overflow-y:auto;}
.nav-sec{padding:7px 18px 3px;font-size:9px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;
  transition:all .2s;border-left:3px solid transparent;font-size:12px;color:rgba(248,249,250,.7);}
.nav-item:hover{background:rgba(201,168,76,.05);color:var(--white);}
.nav-item.active{background:rgba(201,168,76,.08);border-left-color:var(--gold);color:var(--gold);}
.nav-item .ic{font-size:15px;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:9px;}
.sidebar-bottom{padding:14px 18px;border-top:1px solid var(--border);}
.main-content{margin-left:256px;flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{height:60px;background:rgba(9,20,38,.93);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);}
.topbar-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.notif-btn{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;position:relative;}
.notif-dot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--red);}
.page-content{padding:24px;flex:1;}
.page-header{margin-bottom:20px;}
.page-header h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.page-header p{color:var(--gray);font-size:12px;margin-top:3px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:18px;}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.mb-4{margin-bottom:16px;}
.mt-4{margin-top:16px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

/* STAT CARDS */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:18px;
  position:relative;overflow:hidden;transition:transform .2s;}
.stat-card:hover{transform:translateY(-2px);}
.stat-card::before{content:'';position:absolute;top:-10px;right:-10px;width:70px;height:70px;border-radius:50%;opacity:.07;}
.stat-card.gold::before{background:var(--gold);}
.stat-card.blue::before{background:var(--blue);}
.stat-card.green::before{background:var(--green);}
.stat-card.red::before{background:var(--red);}
.stat-card.orange::before{background:var(--orange);}
.stat-icon{font-size:22px;margin-bottom:8px;}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;}
.stat-label{font-size:11px;color:var(--gray);margin-top:2px;}

/* TABLES */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;
  padding:9px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
td{padding:10px 12px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
tr:last-child td{border-bottom:none;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:18px;font-size:10px;font-weight:700;white-space:nowrap;}
.badge-green{background:rgba(46,204,127,.15);color:var(--green);}
.badge-red{background:rgba(231,76,110,.15);color:var(--red);}
.badge-gold{background:rgba(201,168,76,.15);color:var(--gold);}
.badge-blue{background:rgba(59,158,255,.15);color:var(--blue);}
.badge-gray{background:rgba(136,153,170,.15);color:var(--gray);}
.badge-orange{background:rgba(255,140,66,.15);color:var(--orange);}
.badge-purple{background:rgba(155,89,182,.15);color:var(--purple);}

/* SHIFT CELLS */
.sc{padding:4px 7px;border-radius:6px;font-weight:700;font-size:10px;white-space:nowrap;display:inline-block;}
.sc-m{background:rgba(46,204,127,.18);color:#2ecc7f;}
.sc-a{background:rgba(59,158,255,.18);color:#3b9eff;}
.sc-e{background:rgba(255,140,66,.18);color:#ff8c42;}
.sc-n{background:rgba(155,89,182,.18);color:#9b59b6;}
.sc-off{background:rgba(231,76,110,.15);color:#e74c6e;}
.sc-leave{background:rgba(201,168,76,.2);color:var(--gold);}
.sc-sick{background:rgba(231,76,110,.35);color:#ff4040;}
.sc-plv{background:rgba(46,204,127,.35);color:#00d97e;}
.sc-mk{background:rgba(255,140,66,.25);color:#ff8c42;}
.sc-ck{background:rgba(59,158,255,.25);color:#3b9eff;}

/* SCHEDULE GRID */
.sch-wrap{overflow-x:auto;}
.sch-table{min-width:1100px;border-collapse:collapse;}
.sch-table th{background:var(--navy2);padding:9px 6px;font-size:10px;text-align:center;border:1px solid rgba(255,255,255,.06);}
.sch-table td{padding:5px 3px;text-align:center;font-size:10px;border:1px solid rgba(255,255,255,.04);min-width:82px;}
.sch-table .name-col{text-align:left;padding:5px 10px;font-weight:600;font-size:11px;white-space:nowrap;min-width:160px;}
.sch-table .team-col{text-align:center;min-width:80px;}
.today-col{background:rgba(201,168,76,.05)!important;border-left:2px solid rgba(201,168,76,.4)!important;border-right:2px solid rgba(201,168,76,.4)!important;}
.wknd-col th,.wknd-col td{opacity:.7;}

/* TABS */
.tabs{display:flex;gap:3px;background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:11px;padding:3px;margin-bottom:18px;flex-wrap:wrap;}
.tab{padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;color:var(--gray);}
.tab.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);font-weight:700;}
.tab:hover:not(.active){color:var(--white);background:rgba(255,255,255,.05);}
.tab-content{display:none;}
.tab-content.active{display:block;animation:fadeIn .3s ease;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);animation:fadeIn .2s ease;}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:18px;padding:24px;
  width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:fadeIn .3s ease;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-header h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.modal-close{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.05);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:17px;transition:all .2s;}
.modal-close:hover{background:rgba(231,76,110,.15);color:var(--red);}

/* TOAST */
#toastC{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--navy2);border:1px solid var(--border);border-radius:11px;padding:11px 14px;
  display:flex;align-items:center;gap:9px;font-size:12px;min-width:240px;
  animation:slideIn .3s ease;box-shadow:0 8px 28px rgba(0,0,0,.3);}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
.toast.info{border-left:3px solid var(--blue);}

/* ATTENDANCE */
.att-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.att-row:last-child{border-bottom:none;}
.att-info{flex:1;min-width:140px;}
.att-name{font-size:12px;font-weight:600;}
.att-sub{font-size:10px;color:var(--gray);margin-top:1px;}
.att-btns{display:flex;gap:5px;flex-wrap:wrap;}
.att-btn{padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:transparent;cursor:pointer;font-size:10px;font-weight:700;transition:all .2s;color:var(--gray);}
.att-btn:hover{background:rgba(255,255,255,.05);}
.att-btn.sel-present{background:rgba(46,204,127,.2);border-color:var(--green);color:var(--green);}
.att-btn.sel-absent{background:rgba(231,76,110,.2);border-color:var(--red);color:var(--red);}
.att-btn.sel-late{background:rgba(255,140,66,.2);border-color:var(--orange);color:var(--orange);}
.att-btn.sel-sick{background:rgba(59,158,255,.2);border-color:var(--blue);color:var(--blue);}
.att-btn.sel-permission{background:rgba(155,89,182,.2);border-color:var(--purple);color:var(--purple);}
.att-btn.sel-overtime{background:rgba(201,168,76,.2);border-color:var(--gold);color:var(--gold);}

/* SWAP */
.swap-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:10px;}

/* COVERAGE BAR */
.cov-wrap{margin-bottom:10px;}
.cov-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;}
.cov-bg{height:7px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden;}
.cov-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.fill-ok{background:linear-gradient(90deg,var(--green),#5af7b0);}
.fill-warn{background:linear-gradient(90deg,var(--orange),#ffc042);}
.fill-low{background:linear-gradient(90deg,var(--red),#ff6b6b);}

/* NOTIF PANEL */
.notif-panel{position:fixed;top:60px;right:16px;width:300px;background:var(--navy2);
  border:1px solid var(--border);border-radius:15px;z-index:200;box-shadow:var(--shadow);
  animation:fadeIn .2s ease;max-height:380px;overflow-y:auto;}
.notif-item{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:9px;}
.notif-item:last-child{border-bottom:none;}
.nd{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.nt{font-size:11px;line-height:1.5;}
.ntm{font-size:10px;color:var(--gray);margin-top:2px;}

/* SHEETS CONFIG */
.cfg-step{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
.step-num{width:28px;height:28px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:var(--navy);margin-bottom:10px;}
.code-blk{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);border-radius:7px;
  padding:10px;font-family:monospace;font-size:11px;color:var(--gold-light);margin-top:7px;white-space:pre-wrap;word-break:break-all;}

@media(max-width:768px){
  .sidebar{transform:translateX(-256px);}
  .main-content{margin-left:0;}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  .page-content{padding:14px;}
}
</style>
</head>
<body>
<div id="toastC"></div>

<!-- ===================== LOGIN ===================== -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">📅</div>
      <h1>Schedule Portal</h1>
      <p>Kuwait International Bank — Contact Center</p>
    </div>
    <div class="form-group">
      <label class="form-label">Select Your Role</label>
      <div class="role-grid">
        <div class="role-card" onclick="selectRole('agent')" id="role-agent"><div class="ri">👤</div><div class="rn">Agent</div></div>
        <div class="role-card" onclick="selectRole('tl')" id="role-tl"><div class="ri">👥</div><div class="rn">Team Leader</div></div>
        <div class="role-card" onclick="selectRole('manager')" id="role-manager"><div class="ri">🏢</div><div class="rn">Manager</div></div>
        <div class="role-card" onclick="selectRole('wfm')" id="role-wfm"><div class="ri">📊</div><div class="rn">WFM</div></div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Employee Name</label>
      <select class="form-select" id="loginName"><option value="">-- Select name --</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">PIN</label>
      <input type="password" class="form-input" id="loginPin" placeholder="Enter PIN (default: 1234)" maxlength="6">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" style="margin-top:6px;">🔐 Sign In</button>
    <p style="text-align:center;font-size:10px;color:var(--gray);margin-top:16px;">Default PIN: 1234 · Contact WFM for issues</p>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="appLayout" class="hidden">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="lm">
        <div class="ic">📅</div>
        <div><h2>Schedule Portal</h2><p>KIB Contact Center</p></div>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="av" id="sbAvatar">TK</div>
      <div><div class="nm" id="sbName">—</div><div class="rl" id="sbRole">—</div></div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-bottom">
      <button class="btn btn-secondary btn-full btn-sm" onclick="doLogout()">🚪 Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title" id="topbarTitle">Dashboard</span>
      <div class="topbar-right">
        <div class="notif-btn" onclick="toggleNotif()" id="notifBtn">🔔<div class="notif-dot"></div></div>
        <span style="font-size:11px;color:var(--gray);" id="topbarDate"></span>
      </div>
    </div>
    <div class="notif-panel hidden" id="notifPanel">
      <div style="padding:12px 14px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;border-bottom:1px solid var(--border);">Notifications</div>
      <div id="notifList"></div>
    </div>
    <div class="page-content" id="pageContent"></div>
  </div>
</div>

<script>
// ============================================================
// REAL SCHEDULE DATA — extracted from KIB schedule screenshots
// Dates: 02/03/2026 (Mon) → 14/03/2026 (Sat) — 13 days
// Index:   0           1      2(TODAY)  3      4(Fri)  5(Sat)  6(Sun)  7      8      9     10     11(Fri) 12(Sat)
// ============================================================

const DATES = [
  '2026-03-02','2026-03-03','2026-03-04','2026-03-05',
  '2026-03-06','2026-03-07','2026-03-08',
  '2026-03-09','2026-03-10','2026-03-11','2026-03-12',
  '2026-03-13','2026-03-14'

function shiftClass(s){
  if(!s||s==='—') return '';
  if(s==='OFF') return 'sc-off';
  if(s==='P-Leave') return 'sc-plv';
  if(s==='Leave') return 'sc-leave';
  if(s==='Sick') return 'sc-sick';
  if(s.startsWith('M ')) return 'sc-mk';
  if(s.startsWith('C ')) return 'sc-ck';
  const h = parseInt(s);
  if(h>=2&&h<9) return 'sc-n';
  if(h>=9&&h<12) return 'sc-m';
  if(h>=12&&h<17) return 'sc-a';
  return 'sc-e';
}
function shiftLabel(s){
  if(!s) return '—';
  if(s==='OFF') return 'OFF';
  if(s==='P-Leave') return 'P-Leave';
  if(s==='Leave') return 'Leave';
  if(s==='Sick') return '🏥 Sick';
  return s;
}
function teamColor(t){
  const m={'Inbound':'badge-blue','Outbound':'badge-orange','ITM':'badge-purple',
    'Wage':'badge-green','Retention':'badge-gold','Leadership':'badge-red',
    'Assist TL':'badge-blue','Back Office':'badge-gray','OP':'badge-green',
    'SQ':'badge-gold','WFM':'badge-blue','Quality':'badge-orange','Management':'badge-red'};
  return m[t]||'badge-gray';
}

function selectRole(role){
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('role-'+role)?.classList.add('active');
  document.getElementById('loginName').dataset.role = role;
  const sel = document.getElementById('loginName');
  sel.innerHTML='<option value="">-- Select name --</option>';
  const filter={agent:['agent','maker','checker'],tl:['tl','atl'],manager:['manager','head'],wfm:['wfm']};
  AGENTS.filter(a=>(filter[role]||[]).includes(a.role)).forEach(a=>{
    sel.innerHTML+=`<option value="${a.id}">${a.name} (${a.team})</option>`;
  });
}

function doLogin(){
  const id=document.getElementById('loginName').value;
  const pin=document.getElementById('loginPin').value;
  const role=document.getElementById('loginName').dataset.role;
  if(!id){toast('Select your name','error');return;}
  if(!pin){toast('Enter your PIN','error');return;}
  if(pin!=='1234'){toast('Invalid PIN — default is 1234','error');return;}
  if(!role){toast('Select a role','error');return;}
  const agent=AGENTS.find(a=>a.id===id);
  if(!agent) return;
  currentUser={...agent,loginRole:role};
  initApp();
}

function doLogout(){
  currentUser=null;
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('appLayout').classList.add('hidden');
  document.getElementById('loginPin').value='';
  toast('Signed out','info');
}

function initApp(){
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appLayout').classList.remove('hidden');
  const ini=currentUser.name.split(' ').map(n=>n[0]).slice(0,2).join('');
  document.getElementById('sbAvatar').textContent=ini;
  document.getElementById('sbName').textContent=currentUser.name;
  document.getElementById('sbRole').textContent=(currentUser.loginRole||currentUser.role).toUpperCase();
  document.getElementById('topbarDate').textContent=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  buildSidebar();
  renderNotif();
  const first=(MENUS[currentUser.loginRole]||MENUS.agent).find(m=>m.id);
  if(first) navTo(first.id);
}

function buildSidebar(){
  const nav=document.getElementById('sidebarNav');
  const menu=MENUS[currentUser.loginRole]||MENUS.agent;
  nav.innerHTML='';
  menu.forEach(item=>{
    if(item.s){nav.innerHTML+=`<div class="nav-sec">${item.s}</div>`; return;}
    const bc=item.badge==='swaps'?SWAPS.filter(s=>s.status==='pending').length:
             item.badge==='leaves'?LEAVES.filter(l=>l.status==='pending').length:0;
    nav.innerHTML+=`<div class="nav-item" id="nav-${item.id}" onclick="navTo('${item.id}')">
      <span class="ic">${item.ic}</span><span>${item.lb}</span>
      ${bc>0?`<span class="nav-badge">${bc}</span>`:''}
    </div>`;
  });
}

function navTo(pageId){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+pageId)?.classList.add('active');
  const titles={mySchedule:'My Schedule',scheduleRequest:'Schedule Request',swapRequest:'Swap Request',
    myLeaves:'Leave Requests',myAttendance:'My Attendance',tlDashboard:'Team Dashboard',
    teamSchedule:'Team Schedule',attendance:'Daily Attendance',swapApproval:'Swap Approvals',
    tlLeaves:'Leave Management',tlReports:'Reports',dashboard:'Dashboard',
    buildSchedule:'Build Schedule',allSchedules:'All Schedules',forecastPlanning:'Forecast & Planning',
    leaveApprovals:'Leave Approvals',allSwaps:'All Swaps',staffingAnalysis:'Staffing Analysis',
    attendanceReport:'Attendance Report',sheetsConfig:'Google Sheets Config',settings:'Settings'};
  document.getElementById('topbarTitle').textContent=titles[pageId]||pageId;
  const pages={mySchedule:pgMySchedule,scheduleRequest:pgScheduleReq,swapRequest:pgSwapReq,
    myLeaves:pgMyLeaves,myAttendance:pgMyAtt,tlDashboard:pgTLDash,teamSchedule:pgTeamSch,
    attendance:pgAttendance,swapApproval:pgSwapApproval,tlLeaves:pgTLLeaves,tlReports:pgTLReports,
    dashboard:pgManagerDash,buildSchedule:pgBuildSchedule,allSchedules:pgAllSchedules,
    forecastPlanning:pgForecast,leaveApprovals:pgLeaveApprovals,allSwaps:pgAllSwaps,
    staffingAnalysis:pgStaffing,attendanceReport:pgAttReport,sheetsConfig:pgSheetsConfig,settings:pgSettings};
  const fn=pages[pageId];
  document.getElementById('pageContent').innerHTML=`<div class="anim-fade">${fn?fn():'<div class="card">Coming soon</div>'}</div>`;
  if(pageId==='attendance') setTimeout(initAttBtns,100);

function initAttBtns(){
  AGENTS.filter(a=>todayShift(a)==='Sick').forEach(a=>setAtt(a.id,'sick'));
  AGENTS.filter(a=>todayShift(a)==='Leave').forEach(a=>setAtt(a.id,'absent'));
}

function setAtt(id,status){
  attStatuses[id]=status;
  const c=document.getElementById(`att-${id}`);
  if(!c) return;
  c.querySelectorAll('.att-btn').forEach(b=>b.className='att-btn');
  const map={present:0,absent:1,late:2,sick:3,permission:4,overtime:5};
  const btns=c.querySelectorAll('.att-btn');
  if(btns[map[status]]) btns[map[status]].classList.add(`sel-${status}`);
}

function saveAttendance(){
  const entries=Object.entries(attStatuses);
  if(!entries.length){toast('Mark attendance first','error');return;}
  entries.forEach(([id,status])=>{
    const a=AGENTS.find(x=>x.id===id);
    saveToSheet('Attendance',[a?.name||id,'2026-03-04',status,currentUser.name,new Date().toISOString()]);
  });
  toast(`✅ Attendance saved for ${entries.length} agents`,'success');
}

        <input type="number" class="form-input" id="occ" value="85" min="50" max="100" oninput="calcAHT()"></div>
      <div class="form-group"><label class="form-label">Break Buffer</label>
        <input type="number" class="form-input" id="buf" value="1" min="0" max="5" oninput="calcAHT()"></div>
      <div style="background:rgba(201,168,76,.08);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:8px;">
        <div style="font-size:11px;color:var(--gray);margin-bottom:6px;">Peak (1PM · 54 calls) — Agents Required</div>
        <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--gold);" id="calcResult">6</div>
        <div style="font-size:11px;color:var(--gray);">including break buffer</div>
      </div>
    </div>
  </div>`;
}

function calcAHT(){
  const a=parseFloat(document.getElementById('aht').value)||4;
  const o=parseFloat(document.getElementById('occ').value)||85;
  const b=parseFloat(document.getElementById('buf').value)||1;
  document.getElementById('calcResult').textContent=Math.ceil(54*a/60/(o/100))+b;
}

async function testConn(){
  toast('Testing...','info');
  try{
    const r=await fetch(`${SHEETS.base}/${SHEETS.sheetId}?key=${SHEETS.apiKey}&fields=properties.title`);
    const d=await r.json();
    if(d.properties) toast(`✅ Connected: "${d.properties.title}"`, 'success');

// ============================================================
// SHEETS API
// ============================================================
async function saveToSheet(tab,vals){
  if(!SHEETS.apiKey||!SHEETS.sheetId) return;
  try{
    await fetch(`${SHEETS.base}/${SHEETS.sheetId}/values/${tab}!A1:append?valueInputOption=RAW&key=${SHEETS.apiKey}`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({values:[vals]})
    });
  }catch(e){console.warn('Sheets:',e);}
}

async function loadSheets(){
  if(!SHEETS.apiKey||!SHEETS.sheetId){toast('Configure Google Sheets first','error');return;}
  toast('🔄 Loading from Sheets...','info');
  try{
    const r=await fetch(`${SHEETS.base}/${SHEETS.sheetId}/values/ScheduleRequests?key=${SHEETS.apiKey}`);
    const d=await r.json();
    toast(`✅ Loaded ${(d.values||[]).length} records`,'success');
  }catch(e){toast('❌ Load failed','error');}
}

// UTILITIES
// ============================================================
function swTab(groupId,targetId,el){
  document.querySelectorAll(`#${groupId} .tab`).forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  document.querySelectorAll(`#${groupId} ~ .tab-content`).forEach(c=>c.classList.remove('active'));
  const t=document.getElementById(targetId);
  if(t) t.classList.add('active');
}

function toast(msg,type='info'){
  const c=document.getElementById('toastC');
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  const ic={success:'✅',error:'❌',info:'ℹ️'};
  el.innerHTML=`<span>${ic[type]||'ℹ️'}</span><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(()=>el.remove(),3200);
}
